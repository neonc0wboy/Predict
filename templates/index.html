<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch@os Prediction Generator</title>
    <style>
        /* --- GLOBAL VARIABLES & THEMES --- */
        :root {
            /* Default (Stars) */
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --container-bg: rgba(30, 30, 30, 0.85);
            --accent-color: #ff9800;
            --text-main: #e0e0e0;
            --text-dim: #b0b0b0;
            --border-color: rgba(255, 152, 0, 0.3);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --btn-gradient: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            --input-bg: rgba(40, 40, 40, 0.8);
            --shadow-color: rgba(255, 152, 0, 0.2);
        }

        /* Tarot Theme Overrides */
        [data-theme="Tarot"] {
            --bg-primary: #1a001f;
            --bg-secondary: #2a0033;
            --container-bg: rgba(42, 0, 51, 0.85);
            --accent-color: #d236ed;
            --text-main: #f3e5f5;
            --text-dim: #ce93d8;
            --border-color: rgba(156, 39, 176, 0.5);
            --font-main: "Georgia", "Times New Roman", serif;
            --btn-gradient: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
            --input-bg: rgba(60, 20, 80, 0.6);
            --shadow-color: rgba(156, 39, 176, 0.4);
        }

        /* Runes Theme Overrides */
        [data-theme="Runes"] {
            --bg-primary: #1b1410;
            --bg-secondary: #3e2723;
            --container-bg: rgba(46, 28, 20, 0.9);
            --accent-color: #d7ccc8;
            --text-main: #d7ccc8;
            --text-dim: #a1887f;
            --border-color: rgba(141, 110, 99, 0.6);
            --font-main: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            --btn-gradient: linear-gradient(135deg, #5d4037 0%, #3e2723 100%);
            --input-bg: rgba(62, 39, 35, 0.6);
            --shadow-color: rgba(141, 110, 99, 0.3);
        }

        /* Sci-Fi Theme Overrides */
        [data-theme="Sci-Fi"] {
            --bg-primary: #000508;
            --bg-secondary: #001f2b;
            --container-bg: rgba(0, 20, 30, 0.9);
            --accent-color: #00e5ff;
            --text-main: #e0f7fa;
            --text-dim: #4dd0e1;
            --border-color: rgba(0, 229, 255, 0.5);
            --font-main: "Courier New", Courier, monospace;
            --btn-gradient: linear-gradient(135deg, #00acc1 0%, #006064 100%);
            --input-bg: rgba(0, 60, 80, 0.6);
            --shadow-color: rgba(0, 229, 255, 0.3);
        }

        /* Numbers Theme Overrides */
        [data-theme="Numbers"] {
            --bg-primary: #051405;
            --bg-secondary: #0d2a0d;
            --container-bg: rgba(5, 20, 5, 0.9);
            --accent-color: #4caf50;
            --text-main: #e8f5e9;
            --text-dim: #81c784;
            --border-color: rgba(76, 175, 80, 0.6);
            --font-main: "Consolas", "Monaco", monospace;
            --btn-gradient: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            --input-bg: rgba(20, 60, 20, 0.6);
            --shadow-color: rgba(76, 175, 80, 0.3);
        }

        /* --- BASE STYLES --- */
        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.8s ease, color 0.5s ease;
        }

        /* --- DYNAMIC BACKGROUNDS --- */
        
        /* 1. Starfield (Default/Stars) - controlled via opacity */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        /* 2. Sci-Fi Grid */
        .scifi-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -2;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center top;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 3. Tarot Vignette */
        .tarot-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at center, var(--bg-secondary) 0%, #000 100%);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 4. Runes Fog */
        .runes-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 100%, var(--bg-secondary), var(--bg-primary));
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Active classes for backgrounds */
        [data-theme="Stars"] .stars-bg { opacity: 1; }
        [data-theme="Sci-Fi"] .scifi-bg { opacity: 0.15; }
        [data-theme="Tarot"] .tarot-bg { opacity: 1; }
        [data-theme="Runes"] .runes-bg { opacity: 1; }
        [data-theme="Numbers"] .scifi-bg { opacity: 0.05; background-size: 20px 20px; } /* Reuse grid loosely */

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* --- CONTAINER --- */
        .container {
            width: 90%;
            max-width: 700px;
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px var(--shadow-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
            transition: all 0.5s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            /* Dynamic Gradient Title */
            background: linear-gradient(90deg, var(--text-main), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            transition: all 0.5s ease;
            text-shadow: 0 0 10px var(--shadow-color);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .quote {
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 0.5rem;
            border-left: 2px solid var(--accent-color);
            opacity: 0.8;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: color 0.3s ease;
        }

        input, select, button {
            width: 100%;
            padding: 0.85rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--shadow-color);
        }

        button {
            background: var(--btn-gradient);
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-color);
            filter: brightness(1.1);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        /* --- THEME SPECIFIC RESULT STYLES --- */
        .result-container {
            margin-top: 2rem;
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
            display: none;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 15px var(--shadow-color);
            background: rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inner Content Padding */
        .theme-content-wrapper {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
        }

        .theme-header-wrapper {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .theme-header-wrapper h3 {
            color: var(--accent-color);
            margin: 0;
            font-size: 1.2rem;
        }

        /* --- DYNAMIC TAROT CARDS STYLES --- */
        .tarot-cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0 2rem 0;
        }

        /* The Frame Form / "Формочка" */
        .tarot-card-frame {
            width: 150px;
            background: rgba(25, 5, 30, 0.95);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px var(--shadow-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 0.75rem;
        }

        .tarot-card-frame:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: #ffb700;
            box-shadow: 0 12px 25px var(--shadow-color);
        }

        .tarot-card-role {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin: 0.5rem 0 0.25rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .tarot-card-img-wrapper {
            width: 130px;
            height: 200px;
            margin: 0.25rem 0.5rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tarot-card-status {
            position: absolute;
            font-size: 0.8rem;
            color: var(--text-dim);
            z-index: 1;
            text-align: center;
            pointer-events: none;
            padding: 0 0.5rem;
        }

        .tarot-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .tarot-card-frame:hover .tarot-card-img {
            transform: scale(1.08);
        }

        .tarot-card-label {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            text-align: center;
            padding: 0 0.5rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* --- PRE-LOADED TAROT FALLBACK CARD --- */
        .tarot-card {
            width: 120px;
            height: 180px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #000 100%);
            border: 2px solid var(--text-main);
            border-radius: 10px;
            margin: 0 auto 2rem;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .runes-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .rune {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 1rem 0;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .terminal {
            background: #000;
            border-radius: 5px;
            padding: 1.5rem;
            text-align: left;
            border: 1px solid var(--accent-color);
        }

        .prediction-text {
            line-height: 1.6;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            border-left: 3px solid var(--accent-color);
            color: var(--text-main);
            text-align: left;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }

        /* Formatting improvements for list styles in markdown */
        .prediction-text h2, .prediction-text h3 {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.3rem;
        }
        .prediction-text ul {
            margin: 0.5rem 0;
            padding-left: 0;
            list-style: none;
        }
        
        .seed-words {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border-color);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .error {
            color: #cf6679;
            padding: 1rem;
            background: rgba(207, 102, 121, 0.1);
            border-left: 3px solid #cf6679;
            margin-top: 1rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container { padding: 1.5rem; width: 95%; }
            h1 { font-size: 1.8rem; }
            .runes-grid { grid-template-columns: repeat(3, 1fr); }
            .tarot-cards-container { gap: 1rem; }
            .tarot-card-frame { width: 130px; }
            .tarot-card-img-wrapper { width: 110px; height: 170px; }
        }
    </style>
</head>
<body data-theme="Stars">

    <div class="stars-bg" id="starfield"></div>
    <div class="scifi-bg"></div>
    <div class="tarot-bg"></div>
    <div class="runes-bg"></div>

    <div class="container">
        <div class="header">
            <h1>Предсказание от c0wb0y</h1>
            <div class="subtitle">Математически обоснованный Хаос</div>
            <div class="quote">"Хаос — это порядок, который мы еще не расшифровали."</div>
        </div>

        <form id="prediction-form">
            <div class="form-group">
                <label for="name">Ваше имя:</label>
                <input type="text" id="name" required placeholder="Введите имя..." value="Traveler">
            </div>
            
            <div class="form-group">
                <label for="date_for">Интервал:</label>
                <select id="date_for">
                    <option value="24 hours - 72 hours">Ближайшее будущее (1-3 дня)</option>
                    <option value="week">На ближайшую неделю</option>
                    <option value="year">На год вперёд</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="theme">Выберите инструмент:</label>
                <select id="theme">
                    <option value="Stars" selected>✦ Астрология Звёзд (AS)</option>
                    <option value="Tarot">📿 Карты Таро (Т)</option>
                    <option value="Runes">ᚱ Скандинавские Руны (SK)</option>
                    <option value="Sci-Fi">⚡ Sci-Fi Терминал (SF)</option>
                    <option value="Numbers">🔢 Нумерология (NUM)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="invite_code">Код Доступа:</label>
                <input type="password" id="invite_code" required placeholder="***" value="SECRET123">
            </div>
            
            <button type="submit" id="submit-button">Инициировать Прогноз</button>
        </form>

        <div id="result-area" class="result-container">
            <div class="theme-header-wrapper">
                <h3 id="result-title">Результат</h3>
            </div>
            <div class="theme-content-wrapper" id="result-content">
                <!-- Здесь генерируется интерактивный визуальный эффект темы -->
            </div>
            
            <!-- Место под сгенерированную AI картинку -->
            <div style="text-align: center; padding: 0 2rem;">
                <img id="prediction-image" style="display: none; max-width: 100%; max-height: 350px; border-radius: 8px; margin: 0 auto 1.5rem auto; border: 1px solid var(--border-color); box-shadow: 0 0 15px var(--shadow-color);" alt="Prediction Visual">
            </div>

            <div style="padding: 0 2rem 2rem 2rem;">
                <div class="prediction-text" id="prediction-output"></div>
                <div class="seed-words" id="seed-output"></div>
            </div>
        </div>

        <div id="loading" style="display: none;">
            <div class="spinner"></div>
        </div>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        // --- 1. Visual Effects Logic ---

        function createStarfield() {
            const starfield = document.getElementById('starfield');
            starfield.innerHTML = ''; // Clear prev
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.opacity = Math.random();
                star.style.setProperty('--duration', `${1 + Math.random() * 3}s`);
                starfield.appendChild(star);
            }
        }

        // --- 2. Dynamic Theme Switching ---
        
        const themeSelect = document.getElementById('theme');
        const body = document.body;

        // Apply theme immediately on change
        themeSelect.addEventListener('change', (e) => {
            const selectedTheme = e.target.value;
            body.setAttribute('data-theme', selectedTheme);
            document.getElementById('result-area').style.display = 'none';
        });

        // Initialize background
        createStarfield();

        // --- 3. Markdown Formatting Parser ---
        function parseMarkdown(text) {
            if (!text) return "";
            
            let formatted = text
                // Предотвращение базового XSS
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                // Заголовки (###)
                .replace(/^### (.*?)$/gm, '<h3 style="color:var(--accent-color); margin-top:1.5rem; margin-bottom:0.5rem;">$1</h3>')
                // Заголовки (##)
                .replace(/^## (.*?)$/gm, '<h2 style="color:var(--accent-color); margin-top:1.5rem; margin-bottom:0.5rem;">$1</h2>')
                // Заголовки (#)
                .replace(/^# (.*?)$/gm, '<h1 style="color:var(--accent-color); margin-top:1.5rem; margin-bottom:0.5rem;">$1</h1>')
                // Жирный шрифт (**текст**)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Маркированные списки (* или -)
                .replace(/^\s*[\*\-]\s+(.*?)$/gm, '<li style="margin-left: 1.5rem; margin-bottom: 0.5rem; list-style-type: square; color: var(--text-main);">$1</li>')
                // Нумерованные списки (цифра с точкой)
                .replace(/^\s*(\d+)\.\s+(.*?)$/gm, '<li style="margin-left: 1.5rem; margin-bottom: 0.5rem; list-style-type: decimal; color: var(--text-main);"></li>')
                // Переносы строк
                .replace(/\n/g, '<br>');

            // Заключаем маркированные списки <li> в теги <ul>
            if (formatted.includes('<li')) {
                formatted = formatted.replace(/(<li.*?>.*?<\/li>)/g, '<ul>$1</ul>');
                // Удаляем дублирующиеся вложенные теги <ul>
                formatted = formatted.replace(/<\/ul>\s*<ul>/g, '');
            }

            return formatted;
        }

        // --- 4. Result Generators (Visuals inside the result box) ---

        function getThemeVisuals(theme) {
            if (theme === 'Tarot') {
                return `<div class="tarot-card"></div>`;
            } 
            else if (theme === 'Runes') {
                const runes = ['ᚠ', 'ᚢ', 'ᚦ', 'ᚨ', 'ᚱ', 'ᚲ', 'ᚷ', 'ᚹ', 'ᚺ', 'ᚾ', 'ᛁ', 'ᛃ', 'ᛇ', 'ᛈ', 'ᛉ', 'ᛊ', 'ᛏ', 'ᛒ', 'ᛖ', 'ᛗ', 'ᛚ', 'ᛜ', 'ᛟ', 'ᛞ'];
                let gridHtml = '<div class="runes-grid">';
                for(let i=0; i<5; i++) {
                    gridHtml += `<div class="rune">${runes[Math.floor(Math.random()*runes.length)]}</div>`;
                }
                gridHtml += '</div>';
                return gridHtml;
            }
            else if (theme === 'Sci-Fi') {
                return `
                <div class="terminal">
                    <span style="color:#ff5f56">●</span> <span style="color:#ffbd2e">●</span> <span style="color:#27c93f">●</span><br><br>
                    <span style="color:var(--accent-color)">$ executing prediction_protocol.sh...</span><br>
                    <span style="opacity:0.7">> analyzing timeline... done.</span>
                </div>`;
            }
            else if (theme === 'Numbers') {
                const sacred = [7, 11, 33, 42, 108, 144];
                return `<div style="font-size: 4rem; font-weight:bold; color:var(--accent-color); text-shadow:0 0 15px var(--accent-color)">
                    ${sacred[Math.floor(Math.random()*sacred.length)]}
                </div>`;
            }
            else { // Stars (Астрология) fallback
                return `<div style="height:100px; position:relative;">
                    <div class="star" style="width:4px; height:4px; top:50%; left:50%; box-shadow: 0 0 20px white"></div>
                    <div style="position:absolute; width:100%; top:60%; text-align:center; opacity:0.5">✧ Констелляция сформирована ✧</div>
                </div>`;
            }
        }

        // Рендерит каркас для визуальных элементов в зависимости от темы
        function renderThemeVisuals(theme, data) {
            const contentDiv = document.getElementById('result-content');
            
            // Тема: Карты Таро
            if (theme === 'Tarot' && data.seed_words) {
                const words = data.seed_words.split(' ');
                const englishWords = words.filter(w => /^[a-zA-Z]+$/.test(w));
                
                const roles = ["Прошлое", "Настоящее", "Будущее"];
                const selectedWords = englishWords.slice(0, 3);
                
                let html = '<div class="tarot-cards-container">';
                selectedWords.forEach((word, index) => {
                    html += `
                        <div class="tarot-card-frame">
                            <div class="tarot-card-role">${roles[index] || "Влияние"}</div>
                            <div class="tarot-card-img-wrapper">
                                <div class="tarot-card-status">Ожидание...</div>
                                <img class="tarot-card-img" alt="${word}" loading="lazy">
                            </div>
                            <div class="tarot-card-label">${word}</div>
                        </div>
                    `;
                });
                html += '</div>';
                contentDiv.innerHTML = html;

                loadTarotCardsSequentially(selectedWords);
            } 
            // Тема: Астрология (Генератор созвездия по seed-словам)
            else if (theme === 'Stars' && data.seed_words) {
                const words = data.seed_words.split(' ').filter(w => w.length > 0);
                // Ограничиваем до 10 точек, чтобы созвездие выглядело разборчиво и эстетично
                const selectedWords = words.slice(0, 10);
                
                const points = [];
                // Детерминированно рассчитываем координаты звезд на холсте 400x220 на основе символов слов
                selectedWords.forEach((word, i) => {
                    const firstChar = word.charAt(0);
                    const charCode = firstChar.charCodeAt(0) || 0;
                    
                    // Безопасное распределение координат с отступами
                    const x = 40 + ((charCode * 19 + i * 43) % 320);
                    const y = 30 + ((charCode * 29 + i * 31) % 160);
                    
                    points.push({
                        x,
                        y,
                        letter: firstChar.toUpperCase(),
                        word: word
                    });
                });

                // Сортируем точки по оси X слева направо для построения аккуратной линии созвездия
                const sortedPoints = [...points].sort((a, b) => a.x - b.x);
                
                let pathD = "";
                sortedPoints.forEach((p, idx) => {
                    if (idx === 0) pathD += `M ${p.x} ${p.y}`;
                    else pathD += ` L ${p.x} ${p.y}`;
                });

                // Генерируем SVG
                let svgHtml = `
                    <div style="text-align: center; margin-bottom: 1.5rem;">
                        <svg viewBox="0 0 400 220" style="width: 100%; max-width: 450px; height: auto; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid var(--border-color); filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));">
                            <!-- Сетки фоновых мелких звезд -->
                            <g opacity="0.4">
                                <circle cx="50" cy="40" r="1" fill="#fff" />
                                <circle cx="120" cy="180" r="0.8" fill="#fff" />
                                <circle cx="280" cy="70" r="1.2" fill="#fff" />
                                <circle cx="340" cy="150" r="1" fill="#fff" />
                                <circle cx="200" cy="100" r="0.7" fill="#fff" />
                            </g>
                            
                            <!-- Линии созвездия -->
                            <path d="${pathD}" stroke="var(--accent-color)" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="3,3" fill="none" />
                            <path d="${pathD}" stroke="var(--accent-color)" stroke-width="0.5" stroke-opacity="0.3" fill="none" />
                `;

                // Рисуем светящиеся точки звезд (буквы и подписи слов исключены)
                sortedPoints.forEach((p) => {
                    svgHtml += `
                        <!-- Свечение звезды -->
                        <circle cx="${p.x}" cy="${p.y}" r="6" fill="var(--accent-color)" opacity="0.3" style="filter: blur(1.5px);" />
                        <!-- Ядро звезды -->
                        <circle cx="${p.x}" cy="${p.y}" r="2" fill="#ffffff" />
                    `;
                });

                svgHtml += `
                        </svg>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-top:0.5rem; font-style:italic;">
                            ✧ Сигнатура созвездия сформирована по коду Хаоса ✧
                        </div>
                    </div>
                `;
                
                contentDiv.innerHTML = svgHtml;
            } else {
                contentDiv.innerHTML = getThemeVisuals(theme);
            }
        }

        // Асинхронная загрузка картинок Таро
        async function loadTarotCardsSequentially(selectedWords) {
            const container = document.querySelector('.tarot-cards-container');
            if (!container) return;
            
            const frames = container.querySelectorAll('.tarot-card-frame');
            
            for (let i = 0; i < selectedWords.length; i++) {
                const word = selectedWords[i];
                const frame = frames[i];
                if (!frame) continue;

                const img = frame.querySelector('.tarot-card-img');
                const statusText = frame.querySelector('.tarot-card-status');
                
                if (img) {
                    if (statusText) statusText.textContent = "Генерация...";
                    
                    const promptText = `mystical tarot card design representing the concept of ${word}, highly detailed fantasy occult illustration, ornate golden border`;
                    const encodedPrompt = encodeURIComponent(promptText);
                    
                    img.src = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=300&height=450&nologo=true`;
                    
                    img.onload = () => {
                        img.style.opacity = '1';
                        if (statusText) statusText.style.display = 'none';
                    };
                }
                
                if (i < selectedWords.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 5000));
                }
            }
        }

        function getThemeTitle(theme) {
            const titles = {
                'Tarot': '📿 Расклад Таро',
                'Runes': 'ᚱ Рунический Став',
                'Sci-Fi': '⚡ Результат Анализа',
                'Numbers': '🔢 Нумерологический Код',
                'Stars': '✦ Звездная Карта созвездия'
            };
            return titles[theme] || 'Результат';
        }

        // --- 5. Form Handling ---

        const form = document.getElementById('prediction-form');
        const submitButton = document.getElementById('submit-button');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const datefor = document.getElementById('date_for').value;
            const theme = document.getElementById('theme').value;
            const inviteCode = document.getElementById('invite_code').value;

            // UI Loading State
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            submitButton.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, theme, date_for: datefor, invite_code: inviteCode }),
                });

                if (!response.ok) {
                    const errorMsg = await response.json().catch(() => ({ error: 'Неизвестная ошибка сети' }));
                    throw new Error(errorMsg.error || 'Ошибка сети или неверный код доступа');
                }
                
                const data = await response.json();

                // Render Results
                document.getElementById('result-title').textContent = getThemeTitle(theme);
                
                // Рендерим каркас и запускаем поочередную загрузку (если Tarot) или генерацию созвездия (если Stars)
                renderThemeVisuals(theme, data);

                // Новое качественное форматирование текста предсказания
                let rawPrediction = data.prediction || "";
                let formattedPrediction = parseMarkdown(rawPrediction);

                document.getElementById('prediction-output').innerHTML = formattedPrediction;
                document.getElementById('seed-output').textContent = `Seed: ${data.seed_words || 'Unknown'}`;

                // Render the generated main image
                const imgElement = document.getElementById("prediction-image");
                if (data.image_data) {
                    imgElement.src = data.image_data;
                    imgElement.style.display = "block";
                } else {
                    imgElement.src = "";
                    imgElement.style.display = "none";
                }

                document.getElementById('result-area').style.display = 'block';                
            } catch (error) {
                console.error(error);
                const fallbackDiv = document.getElementById('error');
                fallbackDiv.textContent = `Ошибка: ${error.message}`;
                fallbackDiv.style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
                submitButton.disabled = false;
            }
        });
    </script>
</body>
